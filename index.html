  <style>

    /* ─────────────────────────────────────────────────────────────
       POLICE LOCALE : PLIANT (Variable Font)
       Fichiers : fonts/Pliant-VariableFont_wdth,wght.ttf
                  fonts/Pliant-Italic-VariableFont_wdth,wght.ttf
       → Police variable : un seul fichier couvre tous les graisses
         (100 à 900) et toutes les largeurs.
    ───────────────────────────────────────────────────────────── */

    /* Romain (normal) */
    @font-face {
      font-family: 'Pliant';
      src: url('fonts/Pliant-VariableFont_wdth,wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    /* Italique */
    @font-face {
      font-family: 'Pliant';
      src: url('fonts/Pliant-Italic-VariableFont_wdth,wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: italic;
      font-display: swap;
    }

    /* Classe utilitaire réutilisable */
    .font-pliant {
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont,
                   'Helvetica Neue', sans-serif;
    }

    /* ─────────────────────────────────────────────────────────────
       RESET GLOBAL
    ───────────────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      background-color: #ffffff;
      color: #000000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-weight: 400;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    /* ─────────────────────────────────────────────────────────────
       HEADER — STATIC (non sticky)
    ───────────────────────────────────────────────────────────── */
    #site-header {
      position: static;
      width: 100%;
      background-color: #ffffff;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      /* Logo collé à l'extrême gauche, nav collée à l'extrême droite */
      padding: 1.25rem 1rem;
    }

    @media (min-width: 768px) {
      .header-inner {
        padding: 1.25rem 3rem;
      }
    }

    /* Titre gauche — police Pliant */
    .site-title {
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont,
                   'Helvetica Neue', sans-serif;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #000000;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Ligne séparatrice header / grille */
    /* ─── Navigation desktop ─────────────────────────────────── */
    .nav-desktop {
      display: flex;
      align-items: center;
      gap: 0;
      list-style: none;
    }

    /* Élément nav standard — police Pliant */
    .nav-desktop > li > a {
      display: inline-block;
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont,
                   'Helvetica Neue', sans-serif;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000000;
      padding: 5px 10px;
      white-space: nowrap;
      transition: background-color 0.2s ease, color 0.2s ease;
      line-height: 1;
    }

    .nav-desktop > li > a:hover {
      background-color: #000000;
      color: #ffffff;
    }

    /* ─── DROPDOWN "LIVE & NIGHTLIFE" ────────────────────────── */
    .nav-item-dropdown {
      position: relative;
    }

    /* Déclencheur du dropdown — police Pliant */
    .nav-item-dropdown > .nav-trigger {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont,
                   'Helvetica Neue', sans-serif;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000000;
      padding: 5px 10px;
      white-space: nowrap;
      cursor: default;
      transition: background-color 0.2s ease, color 0.2s ease;
      line-height: 1;
      user-select: none;
    }

    /* Flèche indicatrice discrète */
    .nav-trigger::after {
      content: '↓';
      font-size: 0.55rem;
      opacity: 0.55;
      display: inline-block;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .nav-item-dropdown:hover .nav-trigger {
      background-color: #000000;
      color: #ffffff;
    }

    .nav-item-dropdown:hover .nav-trigger::after {
      opacity: 1;
      transform: rotate(180deg);
    }

    /* Panneau dropdown */
    .dropdown-panel {
      position: absolute;
      top: calc(100% + 0px);
      left: 0;
      min-width: 140px;
      background-color: #ffffff;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      list-style: none;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-4px);
      transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
      z-index: 100;
    }

    .nav-item-dropdown:hover .dropdown-panel {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    /* Sous-liens — police Pliant */
    .dropdown-panel li a {
      display: block;
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont,
                   'Helvetica Neue', sans-serif;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000000;
      padding: 8px 10px;
      white-space: nowrap;
      transition: background-color 0.2s ease, color 0.2s ease;
      line-height: 1;
    }

    .dropdown-panel li a:hover {
      background-color: #000000;
      color: #ffffff;
    }

    /* ─── Hamburger (mobile uniquement) ─────────────────────── */
    .btn-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    .btn-hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background-color: #000000;
      transition: transform 0.25s ease, opacity 0.2s ease;
      transform-origin: center;
    }

    /* Hamburger → Croix */
    .btn-hamburger.is-open span:nth-child(1) {
      transform: translateY(6.5px) rotate(45deg);
    }
    .btn-hamburger.is-open span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }
    .btn-hamburger.is-open span:nth-child(3) {
      transform: translateY(-6.5px) rotate(-45deg);
    }

    /* ─── Navigation mobile ──────────────────────────────────── */
    .nav-mobile {
      display: none;
      flex-direction: column;
      background-color: #ffffff;
      border-top: 1px solid #000000;
      list-style: none;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s ease;
    }

    .nav-mobile.is-open {
      max-height: 600px;
    }

    .nav-mobile > li > a,
    .nav-mobile > li > .mobile-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont,
                   'Helvetica Neue', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000000;
      padding: 13px 1.25rem;
      border-bottom: 1px solid #ebebeb;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont,
                   'Helvetica Neue', sans-serif;
      transition: background-color 0.15s ease, color 0.15s ease;
      border-bottom: 1px solid #ebebeb;
    }

    .nav-mobile > li > a:hover,
    .nav-mobile > li > .mobile-trigger:hover {
      background-color: #000000;
      color: #ffffff;
    }

    /* Sous-menu accordéon mobile */
    .mobile-submenu {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
      background-color: #f8f8f8;
    }

    .mobile-submenu.is-open {
      max-height: 200px;
    }

    .mobile-submenu li a {
      display: block;
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont,
                   'Helvetica Neue', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000000;
      padding: 11px 1.25rem 11px 2rem;
      border-bottom: 1px solid #ebebeb;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .mobile-submenu li:last-child a {
      border-bottom: none;
    }

    .mobile-submenu li a:hover {
      background-color: #000000;
      color: #ffffff;
    }

    /* Chevron flèche mobile */
    .mobile-trigger-arrow {
      font-size: 0.6rem;
      opacity: 0.5;
      transition: transform 0.25s ease;
      display: inline-block;
    }

    .nav-mobile > li.is-open .mobile-trigger-arrow {
      transform: rotate(180deg);
      opacity: 1;
    }

    .nav-mobile > li:last-child > a {
      border-bottom: none;
    }

    /* ─────────────────────────────────────────────────────────────
       GALERIE — GRILLE 3 COLONNES INDÉPENDANTES
    ───────────────────────────────────────────────────────────── */
    #gallery {
      padding: 3rem;
    }

    .grid-wrapper {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      align-items: start;
    }

    .grid-col {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .grid-item {
      display: block;
      width: 100%;
      line-height: 0;
      overflow: hidden;
    }

    /* Images — zéro effet au survol */
    .grid-item img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    /* Sur desktop : masquer les blocs extra (réservés au mobile) */
    .mobile-extra {
      display: none;
    }

    /* ─────────────────────────────────────────────────────────────
       FOOTER ÉDITORIAL
    ───────────────────────────────────────────────────────────── */
    #site-footer {
      margin-top: 6rem;
      margin-bottom: 3rem;
      padding: 0 3rem;
    }

    .footer-rule {
      border: none;
      border-top: 1px solid #000000;
      margin-bottom: 2rem;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .footer-signature {
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #000000;
      line-height: 1.75;
    }

    /* Icônes sociales */
    .footer-socials {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .footer-socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000000;
      transition: opacity 0.2s ease;
    }

    .footer-socials a:hover {
      opacity: 0.4;
    }

    .footer-socials svg {
      width: 18px;
      height: 18px;
      fill: #000000;
    }

    /* ─────────────────────────────────────────────────────────────
       RESPONSIVE — MOBILE (< 768px)
    ───────────────────────────────────────────────────────────── */
    @media (max-width: 767px) {

      .header-inner {
        padding: 1rem;
      }

      .nav-desktop {
        display: none;
      }

      .btn-hamburger {
        display: flex;
      }

      .nav-mobile {
        display: flex;
      }

      #gallery {
        padding: 0.75rem;
      }

      /* 2 colonnes parallèles */
      .grid-wrapper {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.6rem;
      }

      .grid-col {
        gap: 0.6rem;
      }

      /* Masquer la 3e colonne */
      #col-3 {
        display: none;
      }

      /* Afficher les images col-3 redistribuées */
      .mobile-extra {
        display: block;
      }

      #site-footer {
        padding: 0 1rem;
        margin-top: 3rem;
        margin-bottom: 2rem;
      }

      .footer-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 1.5rem;
      }
    }

    /* ─── Tablette ───────────────────────────────────────────── */
    @media (min-width: 768px) and (max-width: 1023px) {

      .header-inner {
        padding: 1.25rem 2rem;
      }

      .nav-desktop > li > a,
      .nav-trigger,
      .dropdown-panel li a {
        font-size: 0.625rem;
        font-weight: 500;
        padding: 4px 7px;
      }

      #gallery {
        padding: 2rem;
      }

      .grid-wrapper {
        gap: 1rem;
      }

      .grid-col {
        gap: 1rem;
      }

      #site-footer {
        padding: 0 2rem;
      }
    }

    /* ─── Grand desktop ──────────────────────────────────────── */
    @media (min-width: 1440px) {

      .header-inner {
        padding: 1.75rem 4rem;
      }

      #gallery {
        padding: 3rem 4rem;
      }

      .grid-wrapper {
        gap: 2rem;
      }

      .grid-col {
        gap: 2rem;
      }

      #site-footer {
        padding: 0 4rem;
        margin-top: 8rem;
      }
    }

  </style>

  <!-- ═══════════════════════════════════════════════════════════
       JAVASCRIPT — HAMBURGER & ACCORDÉON MOBILE
  ══════════════════════════════════════════════════════════════ -->
  <script>
    (function () {
      'use strict';

      /* ── Hamburger principal ─────────────────────────────── */
      var btnHamburger = document.getElementById('btn-hamburger');
      var navMobile    = document.getElementById('nav-mobile');
      var siteHeader   = document.getElementById('site-header');

      if (!btnHamburger || !navMobile) return;

      function openMenu() {
        btnHamburger.classList.add('is-open');
        navMobile.classList.add('is-open');
        btnHamburger.setAttribute('aria-expanded', 'true');
        btnHamburger.setAttribute('aria-label', 'Fermer le menu');
      }

      function closeMenu() {
        btnHamburger.classList.remove('is-open');
        navMobile.classList.remove('is-open');
        btnHamburger.setAttribute('aria-expanded', 'false');
        btnHamburger.setAttribute('aria-label', 'Ouvrir le menu');
        /* Ferme aussi le sous-menu accordéon */
        closeLiveSubmenu();
      }

      function toggleMenu() {
        navMobile.classList.contains('is-open') ? closeMenu() : openMenu();
      }

      btnHamburger.addEventListener('click', toggleMenu);

      /* Fermeture au clic extérieur */
      document.addEventListener('click', function (e) {
        if (siteHeader && !siteHeader.contains(e.target)) closeMenu();
      });

      /* Fermeture sur un lien (sauf le trigger accordéon) */
      navMobile.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', closeMenu);
      });

      /* Fermeture si viewport > mobile */
      window.addEventListener('resize', function () {
        if (window.innerWidth >= 768) closeMenu();
      });

      /* Fermeture avec Échap */
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeMenu();
      });

      /* ── Accordéon mobile : Live & Nightlife ─────────────── */
      var liveTrigger  = document.getElementById('mobile-live-trigger');
      var liveSubmenu  = document.getElementById('mobile-live-submenu');
      var liveItem     = document.getElementById('mobile-live-item');

      function openLiveSubmenu() {
        if (!liveSubmenu || !liveItem || !liveTrigger) return;
        liveSubmenu.classList.add('is-open');
        liveItem.classList.add('is-open');
        liveTrigger.setAttribute('aria-expanded', 'true');
      }

      function closeLiveSubmenu() {
        if (!liveSubmenu || !liveItem || !liveTrigger) return;
        liveSubmenu.classList.remove('is-open');
        liveItem.classList.remove('is-open');
        liveTrigger.setAttribute('aria-expanded', 'false');
      }

      if (liveTrigger) {
        liveTrigger.addEventListener('click', function (e) {
          e.stopPropagation();
          liveItem.classList.contains('is-open')
            ? closeLiveSubmenu()
            : openLiveSubmenu();
        });
      }

      /* ── Dropdown desktop : accessibilité clavier ────────── */
      var dropdownLive = document.getElementById('dropdown-live');
      var navTrigger   = dropdownLive ? dropdownLive.querySelector('.nav-trigger') : null;

      if (navTrigger) {
        navTrigger.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            var expanded = navTrigger.getAttribute('aria-expanded') === 'true';
            navTrigger.setAttribute('aria-expanded', String(!expanded));
          }
        });
      }

    }());
  </script>


<script>
  document.addEventListener("DOMContentLoaded", () => {
    // Sélectionne toutes les images (on suppose que les images de galerie sont les principales)
    // On peut cibler plus spécifiquement si nécessaire, mais l'instruction dit "de chaque image de la galerie (sauf les 3 premières)"
    const images = Array.from(document.querySelectorAll("img"));
    const galleryImages = images.slice(3);
    
    // Pixel transparent pour vider le src proprement sans afficher d'icône d'erreur
    const transparentPixel = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";

    // Étape A : Stocker le src et vider l'image
    galleryImages.forEach(img => {
      if (img.src && !img.getAttribute('data-src')) {
        img.setAttribute('data-src', img.src);
        img.src = transparentPixel;
      }
    });

    // Observer pour le recyclage
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const img = entry.target;
        const dataSrc = img.getAttribute('data-src');
        if (!dataSrc) return;
        
        if (entry.isIntersecting) {
          // Étape B : Injection du src pour affichage
          if (img.src !== dataSrc) {
            img.src = dataSrc;
          }
        } else {
          // Étape C : Suppression du src pour libérer la RAM (texture unloading)
          // On ne le fait que si ce n'est pas déjà le pixel transparent
          if (img.src !== transparentPixel) {
            img.src = transparentPixel;
          }
        }
      });
    }, {
      rootMargin: "300px 0px 300px 0px", // Précharge légèrement avant l'affichage
      threshold: 0
    });

    galleryImages.forEach(img => {
      observer.observe(img);
    });
  });
</script>
