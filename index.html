<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Owen Peria — Photographer, Filmmaker. Live &amp; Nightlife, Studio &amp; Editorial, Street Photography. Based in Paris." />
  <title>Owen Peria — Photographer, Filmmaker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    @font-face {
      font-family: 'Pliant';
      src: url('fonts/Pliant-VariableFont_wdth,wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Pliant';
      src: url('fonts/Pliant-Italic-VariableFont_wdth,wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: italic;
      font-display: swap;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    body {
      background-color: #ffffff;
      color: #000000;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-overflow-scrolling: touch;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* HEADER */
    #site-header {
      position: static;
      width: 100%;
      background-color: #ffffff;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 1.25rem 1rem;
    }

    @media (min-width: 768px) {
      .header-inner {
        padding: 1.25rem 3rem;
      }
    }

    .site-title {
      font-family: 'Pliant', sans-serif;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-desktop {
      display: flex;
      align-items: center;
      gap: 0;
      list-style: none;
    }

    .nav-desktop>li>a {
      display: inline-block;
      font-family: 'Pliant', sans-serif;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 10px;
      transition: 0.2s ease;
    }

    .nav-desktop>li>a:hover {
      background-color: #000000;
      color: #ffffff;
    }

    .nav-item-dropdown {
      position: relative;
    }

    .nav-item-dropdown>.nav-trigger {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'Pliant', sans-serif;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 10px;
      cursor: default;
      transition: 0.2s ease;
    }

    .nav-trigger::after {
      content: '↓';
      font-size: 0.55rem;
      opacity: 0.55;
      transition: 0.2s ease;
    }

    .nav-item-dropdown:hover .nav-trigger {
      background-color: #000000;
      color: #ffffff;
    }

    .nav-item-dropdown:hover .nav-trigger::after {
      opacity: 1;
      transform: rotate(180deg);
    }

    .dropdown-panel {
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 140px;
      background-color: #ffffff;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      list-style: none;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-4px);
      transition: 0.18s ease;
      z-index: 100;
    }

    .nav-item-dropdown:hover .dropdown-panel {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown-panel li a {
      display: block;
      font-family: 'Pliant', sans-serif;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 10px;
      transition: 0.2s ease;
    }

    .dropdown-panel li a:hover {
      background-color: #000000;
      color: #ffffff;
    }

    /* MENU MOBILE */
    .btn-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    .btn-hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background-color: #000000;
      transition: 0.25s ease;
      transform-origin: center;
    }

    .btn-hamburger.is-open span:nth-child(1) {
      transform: translateY(6.5px) rotate(45deg);
    }

    .btn-hamburger.is-open span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }

    .btn-hamburger.is-open span:nth-child(3) {
      transform: translateY(-6.5px) rotate(-45deg);
    }

    .nav-mobile {
      display: none;
      flex-direction: column;
      background-color: #ffffff;
      border-top: 1px solid #000000;
      list-style: none;
      overflow: hidden;
      max-height: 0;
      transition: 0.35s ease;
    }

    .nav-mobile.is-open {
      max-height: 600px;
    }

    .nav-mobile>li>a,
    .nav-mobile>li>.mobile-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Pliant', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 13px 1.25rem;
      border-bottom: 1px solid #ebebeb;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: 0.15s ease;
    }

    .nav-mobile>li>a:hover,
    .nav-mobile>li>.mobile-trigger:hover {
      background-color: #000000;
      color: #ffffff;
    }

    .mobile-submenu {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: 0.25s ease;
      background-color: #f8f8f8;
    }

    .mobile-submenu.is-open {
      max-height: 200px;
    }

    .mobile-submenu li a {
      display: block;
      font-family: 'Pliant', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 11px 1.25rem 11px 2rem;
      border-bottom: 1px solid #ebebeb;
      transition: 0.15s ease;
    }

    .mobile-submenu li a:hover {
      background-color: #000000;
      color: #ffffff;
    }

    .mobile-trigger-arrow {
      font-size: 0.6rem;
      opacity: 0.5;
      transition: 0.25s ease;
      display: inline-block;
    }

    .nav-mobile>li.is-open .mobile-trigger-arrow {
      transform: rotate(180deg);
      opacity: 1;
    }

    /* ─────────────────────────────────────────────────────────────
       GALERIE — CSS MASONRY NATIVE (MÉTHODE FRANCOFOLIES)
    ───────────────────────────────────────────────────────────── */
    #gallery {
      width: 100%;
      margin: 0 auto;
    }

    .masonry-gallery {
      column-count: 2;
      column-gap: 0.75rem;
      padding: 0.75rem;
    }

    @media (min-width: 768px) {
      .masonry-gallery {
        column-count: 3;
        column-gap: 1.5rem;
        padding: 3rem;
      }
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 0.75rem;
    }

    @media (min-width: 768px) {
      .masonry-item {
        margin-bottom: 1.5rem;
      }
    }

    .masonry-item img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    /* FOOTER */
    #site-footer {
      margin-top: 6rem;
      margin-bottom: 3rem;
      padding: 0 3rem;
    }

    .footer-rule {
      border: none;
      border-top: 1px solid #000000;
      margin-bottom: 2rem;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .footer-signature {
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      line-height: 1.75;
    }

    .footer-socials {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .footer-socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000000;
      transition: 0.2s ease;
    }

    .footer-socials a:hover {
      opacity: 0.4;
    }

    .footer-socials svg {
      width: 18px;
      height: 18px;
      fill: #000000;
    }

    @media (max-width: 767px) {
      .header-inner {
        padding: 1rem;
      }

      .nav-desktop {
        display: none;
      }

      .btn-hamburger {
        display: flex;
      }

      .nav-mobile {
        display: flex;
      }

      #site-footer {
        padding: 0 1rem;
        margin-top: 3rem;
        margin-bottom: 2rem;
      }

      .footer-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 1.5rem;
      }
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .header-inner {
        padding: 1.25rem 2rem;
      }

      #site-footer {
        padding: 0 2rem;
      }
    }

    @media (min-width: 1440px) {
      .header-inner {
        padding: 1.75rem 4rem;
      }

      #site-footer {
        padding: 0 4rem;
        margin-top: 8rem;
      }
    }
  </style>

  <script>
    (function () {
      'use strict';
      var btnHamburger = document.getElementById('btn-hamburger');
      var navMobile = document.getElementById('nav-mobile');
      var siteHeader = document.getElementById('site-header');

      if (!btnHamburger || !navMobile) return;

      function openMenu() { btnHamburger.classList.add('is-open'); navMobile.classList.add('is-open'); }
      function closeMenu() { btnHamburger.classList.remove('is-open'); navMobile.classList.remove('is-open'); }
      function toggleMenu() { navMobile.classList.contains('is-open') ? closeMenu() : openMenu(); }

      btnHamburger.addEventListener('click', toggleMenu);
      document.addEventListener('click', function (e) { if (siteHeader && !siteHeader.contains(e.target)) closeMenu(); });
      navMobile.querySelectorAll('a').forEach(function (link) { link.addEventListener('click', closeMenu); });
      window.addEventListener('resize', function () { if (window.innerWidth >= 768) closeMenu(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeMenu(); });

      var liveTrigger = document.getElementById('mobile-live-trigger');
      var liveItem = document.getElementById('mobile-live-item');
      var liveSubmenu = document.getElementById('mobile-live-submenu');

      if (liveTrigger) {
        liveTrigger.addEventListener('click', function (e) {
          e.stopPropagation();
          liveSubmenu.classList.toggle('is-open');
          liveItem.classList.toggle('is-open');
        });
      }
    }());
  </script>
