  <style>

    /* ─────────────────────────────────────────────────────────────
       POLICE LOCALE : PLIANT (Variable Font)
    ───────────────────────────────────────────────────────────── */
    @font-face {
      font-family: 'Pliant';
      src: url('fonts/Pliant-VariableFont_wdth,wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Pliant';
      src: url('fonts/Pliant-Italic-VariableFont_wdth,wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: italic;
      font-display: swap;
    }

    /* ─────────────────────────────────────────────────────────────
       RESET GLOBAL
    ───────────────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      background-color: #ffffff;
      color: #000000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-weight: 400;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

        /* ─────────────────────────────────────────────────────────────
       HEADER — STATIC
    ───────────────────────────────────────────────────────────── */
    #site-header {
      position: relative;
      width: 100%;
      background-color: #ffffff;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      z-index: 50;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 1.5rem 1rem;
    }

    @media (min-width: 768px) {
      .header-inner {
        padding: 1.5rem 3rem;
      }
    }

    .site-title {
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #000000;
      white-space: nowrap;
      flex-shrink: 0;
    }
    @media (min-width: 768px) {
      .site-title {
        font-size: 0.875rem;
      }
    }

    /* ─── Navigation desktop ─────────────────────────────────── */
    .nav-desktop {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    @media (min-width: 768px) {
      .nav-desktop {
        gap: 2rem;
      }
    }

    .nav-desktop > li > a {
      display: inline-block;
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #000000;
      padding: 0.5rem 0;
      white-space: nowrap;
      transition: opacity 0.2s ease;
      line-height: 1;
    }
    @media (min-width: 768px) {
      .nav-desktop > li > a { font-size: 0.875rem; }
    }

    .nav-desktop > li > a:hover {
      opacity: 0.6;
    }

    /* ─── DROPDOWN "LIVE & NIGHTLIFE" ────────────────────────── */
    .nav-item-dropdown {
      position: relative;
    }

    .nav-item-dropdown > .nav-trigger {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #000000;
      padding: 0.5rem 0;
      white-space: nowrap;
      cursor: pointer;
      transition: opacity 0.2s ease;
      line-height: 1;
      user-select: none;
    }
    @media (min-width: 768px) {
      .nav-item-dropdown > .nav-trigger { font-size: 0.875rem; }
    }

    .nav-item-dropdown:hover .nav-trigger {
      opacity: 0.6;
    }

    .dropdown-panel {
      position: absolute;
      top: 100%;
      right: 0;
      min-width: 160px;
      background-color: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      list-style: none;
      display: none;
      flex-direction: column;
      z-index: 50;
      margin: 0;
      padding: 0;
    }

    .nav-item-dropdown:hover .dropdown-panel {
      display: flex;
    }

    .dropdown-panel li a {
      display: block;
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #000000;
      padding: 0.75rem 1rem;
      text-align: left;
      white-space: nowrap;
      transition: background-color 0.2s ease, color 0.2s ease;
      line-height: 1;
    }

    .dropdown-panel li a:hover {
      background-color: #000000;
      color: #ffffff;
    }

    @media (max-width: 1023px) {
      .hidden-lg { display: none !important; }
    }

    /* ─── Hamburger (mobile) ─────────────────────────────────── */
    .btn-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    .btn-hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background-color: #000000;
      transition: transform 0.25s ease, opacity 0.2s ease;
      transform-origin: center;
    }

    .btn-hamburger.is-open span:nth-child(1) {
      transform: translateY(6.5px) rotate(45deg);
    }
    .btn-hamburger.is-open span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }
    .btn-hamburger.is-open span:nth-child(3) {
      transform: translateY(-6.5px) rotate(-45deg);
    }

    /* ─── Navigation mobile ──────────────────────────────── */
    .nav-mobile {
      display: none;
      flex-direction: column;
      background-color: #ffffff;
      border-top: 1px solid #000000;
      list-style: none;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s ease;
    }

    .nav-mobile.is-open {
      max-height: 600px;
    }

    .nav-mobile > li > a,
    .nav-mobile > li > .mobile-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont,
                   'Helvetica Neue', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000000;
      padding: 13px 1.25rem;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: background-color 0.15s ease, color 0.15s ease;
      border-bottom: 1px solid #ebebeb;
    }

    .nav-mobile > li > a:hover,
    .nav-mobile > li > .mobile-trigger:hover,
    .nav-mobile > li > a.is-active {
      background-color: #000000;
      color: #ffffff;
    }

    .mobile-submenu {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
      background-color: #f8f8f8;
    }

    .mobile-submenu.is-open {
      max-height: 200px;
    }

    .mobile-submenu li a {
      display: block;
      font-family: 'Pliant', 'Inter', -apple-system, BlinkMacSystemFont,
                   'Helvetica Neue', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000000;
      padding: 11px 1.25rem 11px 2rem;
      border-bottom: 1px solid #ebebeb;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .mobile-submenu li:last-child a {
      border-bottom: none;
    }

    .mobile-submenu li a:hover,
    .mobile-submenu li a.is-active {
      background-color: #000000;
      color: #ffffff;
    }

    .mobile-trigger-arrow {
      font-size: 0.6rem;
      opacity: 0.5;
      transition: transform 0.25s ease;
      display: inline-block;
    }

    .nav-mobile > li.is-open .mobile-trigger-arrow {
      transform: rotate(180deg);
      opacity: 1;
    }

    .nav-mobile > li:last-child > a {
      border-bottom: none;
    }

    /* ─────────────────────────────────────────────────────────────
       TITRE DE SECTION
    ───────────────────────────────────────────────────────────── */
    .page-label {
      padding: 1.5rem 3rem 0;
      font-family: 'Pliant', 'Inter', sans-serif;
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #000000;
    }

    /* ─────────────────────────────────────────────────────────────
       GALERIE — GRILLE 3 COLONNES INDÉPENDANTES
    ───────────────────────────────────────────────────────────── */
    #gallery {
      padding: 3rem;
    }

    .grid-wrapper {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      align-items: start;
    }

    .grid-col {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .grid-item {
      display: block;
      width: 100%;
      line-height: 0;
      overflow: hidden;
    }

    /* Zéro effet au survol */
    .grid-item img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    /* Desktop : masquer les blocs réservés au mobile */
    .mobile-extra {
      display: none;
    }

    /* ─────────────────────────────────────────────────────────────
       FOOTER ÉDITORIAL
    ───────────────────────────────────────────────────────────── */
    #site-footer {
      margin-top: 6rem;
      margin-bottom: 3rem;
      padding: 0 3rem;
    }

    .footer-rule {
      border: none;
      border-top: 1px solid #000000;
      margin-bottom: 2rem;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .footer-signature {
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #000000;
      line-height: 1.75;
    }

    .footer-socials {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .footer-socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000000;
      transition: opacity 0.2s ease;
    }

    .footer-socials a:hover {
      opacity: 0.4;
    }

    .footer-socials svg {
      width: 18px;
      height: 18px;
      fill: #000000;
    }

    /* ─────────────────────────────────────────────────────────────
       RESPONSIVE — MOBILE (< 768px)
    ───────────────────────────────────────────────────────────── */
    @media (max-width: 767px) {

      .header-inner {
        padding: 1rem;
      }

      .nav-desktop {
        display: none;
      }

      .btn-hamburger {
        display: flex;
      }

      .nav-mobile {
        display: flex;
      }

      .page-label {
        padding: 1rem 1rem 0;
      }

      #gallery {
        padding: 0.75rem;
      }

      .grid-wrapper {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.6rem;
      }

      .grid-col {
        gap: 0.6rem;
      }

      /* Masquer col-3 sur mobile */
      #col-3 {
        display: none;
      }

      /* Afficher les redistributions de col-3 */
      .mobile-extra {
        display: block;
      }

      #site-footer {
        padding: 0 1rem;
        margin-top: 3rem;
        margin-bottom: 2rem;
      }

      .footer-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 1.5rem;
      }
    }

    /* ─── Tablette ─────────────────────────────────────────── */
    @media (min-width: 768px) and (max-width: 1023px) {

      .header-inner {
        padding: 1.25rem 2rem;
      }

      .nav-desktop > li > a,
      .nav-trigger,
      .dropdown-panel li a {
        font-size: 0.625rem;
        font-weight: 500;
        padding: 4px 7px;
      }

      .page-label {
        padding: 1.5rem 2rem 0;
      }

      #gallery {
        padding: 2rem;
      }

      .grid-wrapper { gap: 1rem; }
      .grid-col     { gap: 1rem; }

      #site-footer {
        padding: 0 2rem;
      }
    }

    /* ─── Grand desktop ───────────────────────────────────── */
    @media (min-width: 1440px) {

      .header-inner {
        padding: 1.75rem 4rem;
      }

      .page-label {
        padding: 2rem 4rem 0;
      }

      #gallery {
        padding: 3rem 4rem;
      }

      .grid-wrapper { gap: 2rem; }
      .grid-col     { gap: 2rem; }

      #site-footer {
        padding: 0 4rem;
        margin-top: 8rem;
      }
    }

  </style>

</head>

  <!-- ═══════════════════════════════════════════════════════════
       JAVASCRIPT — HAMBURGER & ACCORDION MOBILE
  ══════════════════════════════════════════════════════════════ -->
  <script>
    (function () {
      'use strict';

      var btn       = document.getElementById('btn-hamburger');
      var navMob    = document.getElementById('nav-mobile');
      var header    = document.getElementById('site-header');

      if (!btn || !navMob) return;

      function openMenu() {
        btn.classList.add('is-open');
        navMob.classList.add('is-open');
        btn.setAttribute('aria-expanded', 'true');
        btn.setAttribute('aria-label', 'Close menu');
      }

      function closeMenu() {
        btn.classList.remove('is-open');
        navMob.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
        btn.setAttribute('aria-label', 'Open menu');
        closeLiveSubmenu();
      }

      btn.addEventListener('click', function () {
        navMob.classList.contains('is-open') ? closeMenu() : openMenu();
      });

      document.addEventListener('click', function (e) {
        if (header && !header.contains(e.target)) closeMenu();
      });

      navMob.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', closeMenu);
      });

      window.addEventListener('resize', function () {
        if (window.innerWidth >= 768) closeMenu();
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeMenu();
      });

      /* Accordion : Live & Nightlife */
      var liveTrigger = document.getElementById('mobile-live-trigger');
      var liveSubmenu = document.getElementById('mobile-live-submenu');
      var liveItem    = document.getElementById('mobile-live-item');

      function openLiveSubmenu() {
        if (!liveSubmenu || !liveItem || !liveTrigger) return;
        liveSubmenu.classList.add('is-open');
        liveItem.classList.add('is-open');
        liveTrigger.setAttribute('aria-expanded', 'true');
      }

      function closeLiveSubmenu() {
        if (!liveSubmenu || !liveItem || !liveTrigger) return;
        liveSubmenu.classList.remove('is-open');
        liveItem.classList.remove('is-open');
        liveTrigger.setAttribute('aria-expanded', 'false');
      }

      if (liveTrigger) {
        liveTrigger.addEventListener('click', function (e) {
          e.stopPropagation();
          liveItem.classList.contains('is-open') ? closeLiveSubmenu() : openLiveSubmenu();
        });
      }

      /* Desktop dropdown — keyboard accessibility */
      var dropdownLive = document.getElementById('dropdown-live');
      var navTrigger   = dropdownLive ? dropdownLive.querySelector('.nav-trigger') : null;

      if (navTrigger) {
        navTrigger.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            var expanded = navTrigger.getAttribute('aria-expanded') === 'true';
            navTrigger.setAttribute('aria-expanded', String(!expanded));
          }
        });
      }

    }());
  </script>
